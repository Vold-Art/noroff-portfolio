<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Noroff Portfolio | Arnt Helge Vold</title>
		<link href="./dist/output.css" rel="stylesheet" />
		<script
			src="https://kit.fontawesome.com/0c6f9a3b2b.js"
			crossorigin="anonymous"
		></script>
	</head>

	<body class="min-h-screen bg-charcoal font-body">
		<header class="bg-charcoal px-6 py-10 text-white">
			<a href="./index.html" class="mx-auto flex w-fit flex-col items-center">
				<img
					src="./assets/images/vold-logo-white.png"
					alt="Vold Art logo"
					class="h-auto w-[250px]"
				/>
				<p class="text-center text-2xl font-extralight">Arnt Helge Vold</p>
			</a>
		</header>

		<main class="bg-page px-8 pt-0 pb-16 text-charcoal min-[1450px]:pt-24">
			<div id="desktop-portfolio-mount"></div>

			<div class="block min-[1450px]:hidden py-10 text-center">
				<section class="mx-auto max-w-[900px] px-4 pt-8 pb-6">
					<div class="relative z-20 mb-6 flex justify-center">
						<div
							class="w-full max-w-[650px] border-[3px] border-charcoal bg-page px-6 py-3"
						>
							<h1
								class="text-center text-xs uppercase tracking-[0.25em] sm:text-sm sm:tracking-[0.35em]"
							>
								Frontend Development Portfolio
							</h1>
						</div>
					</div>

					<div class="space-y-10 pb-6">
						<a href="./css-frameworks.html" class="relative block px-6 py-6">
							<svg
								viewBox="0 0 1400 1000"
								class="pointer-events-none absolute left-1/2 top-[50%] z-0 w-[110%] max-w-[calc(100vw-4rem)] -translate-x-1/2 -translate-y-1/2"
								aria-hidden="true"
							>
								<polygon
									points="
							700,0
							0,850
							1400,150
							700,1000
							0,150
							1400,850
						"
									fill="none"
									stroke="#252525"
									stroke-width="3"
									vector-effect="non-scaling-stroke"
								/>
							</svg>

							<div
								class="relative z-10 border-[3px] border-charcoal bg-page p-[10px]"
							>
								<article
									class="relative min-h-[400px] overflow-hidden border-[3px] border-charcoal"
								>
									<img
										src="./assets/images/template.webp"
										alt="CSS Frameworks project preview"
										class="absolute inset-0 h-full w-full object-cover"
									/>

									<div class="absolute inset-0 bg-charcoal/75"></div>

									<div
										class="relative z-10 flex min-h-[400px] flex-col items-center justify-center p-8 text-center text-white"
									>
										<h2 class="font-display text-3xl leading-tight sm:text-4xl">
											CSS Frameworks
										</h2>

										<p class="mt-4 max-w-[420px] leading-relaxed">
											A responsive frontend project focused on layout, structure
											and styling.
										</p>
									</div>
								</article>
							</div>
						</a>
					</div>
				</section>
			</div>
		</main>

		<footer
			class="w-full bg-charcoal text-white border-t border-white/10 py-14"
		>
			<div class="mx-auto max-w-[1420px] px-8">
				<div
					class="grid grid-cols-1 gap-10 md:grid-cols-3 md:items-center md:gap-0"
				>
					<section class="flex justify-center">
						<a
							href="https://www.vold-art.com"
							class="text-[16px] font-extralight text-white hover:opacity-70 transition-opacity"
						>
							Vold Art
						</a>
					</section>

					<section class="flex justify-center">
						<h2 class="sr-only">Social links</h2>

						<div class="flex items-center justify-center gap-12">
							<a
								href="https://www.instagram.com/ahvoldart/"
								aria-label="Instagram"
								class="hover:opacity-70 transition-opacity"
							>
								<i class="fa-brands fa-instagram text-[32px]"></i>
							</a>

							<a
								href="mailto:vold1@live.no"
								aria-label="Email"
								class="hover:opacity-70 transition-opacity"
							>
								<i class="fa-solid fa-envelope text-[30px]"></i>
							</a>

							<a
								href="https://www.facebook.com/arnt.vold/"
								aria-label="Facebook"
								class="hover:opacity-70 transition-opacity"
							>
								<i class="fa-brands fa-facebook text-[30px]"></i>
							</a>
						</div>
					</section>

					<section class="flex justify-center">
						<a
							href="https://github.com/Vold-Art"
							class="text-[16px] font-extralight text-white hover:opacity-70 transition-opacity"
						>
							GitHub Profile
						</a>
					</section>
				</div>

				<p class="mt-10 text-center text-[16px] font-extralight text-white">
					© 2026 · Arnt Helge Vold
				</p>
			</div>
		</footer>

		<script type="module" src="./js/components/desktopPortfolio.js"></script>
	</body>
</html>
