<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Noroff Portfolio | Arnt Helge Vold</title>
		<link href="./dist/output.css" rel="stylesheet" />
	</head>

	<body class="min-h-screen bg-charcoal font-body">
		<header class="bg-charcoal px-6 py-10 text-white">
			<a href="./index.html" class="mx-auto flex w-fit flex-col items-center">
				<img
					src="./assets/images/vold-logo-white.png"
					alt="Vold Art logo"
					class="h-auto w-[250px]"
				/>
				<p class="text-center text-2xl font-extralight">Arnt Helge Vold</p>
			</a>
		</header>

		<main
			class="bg-red-400 px-8 py-12 sm:px-10 sm:py-16 lg:px-12 text-charcoal"
		>
			<section class="mx-auto max-w-6xl text-center">
				<h1 class="mb-4 text-sm uppercase tracking-[0.35em]">
					Frontend Development Portfolio
				</h1>

				<section class="mx-auto mt-16 max-w-6xl">
					<div
						class="relative mx-auto hidden h-[740px] max-w-[1200px] md:block"
					>
						<div class="absolute inset-0 border-[3px] border-charcoal"></div>

						<a
							href="./css-frameworks.html"
							class="absolute left-0 top-0 h-[350px] w-[800px] overflow-hidden border"
							style="
								clip-path: polygon(
									0 0,
									100% 0,

									95% 30%,
									45% 85%,
									33% 85%,
									20% 100%,
									12% 90%,

									0 90%
								);
								transform: translate(10px, 10px);
							"
						>
							<img
								src="./assets/images/template.webp"
								alt="CSS Frameworks project preview"
								class="h-full w-full object-cover"
							/>
						</a>

						<a
							href="#"
							class="absolute top-0 right-[105px] h-[110px] w-[280px] overflow-hidden border"
							style="
								clip-path: polygon(20% 0, 100% 0%, 7% 88%);
								transform: translate(0, 10px);
							"
						>
							<img
								src="./assets/images/template.webp"
								alt=""
								class="h-full w-full object-cover"
							/>
						</a>

						<a
							href="#"
							class="absolute right-0 top-0 h-[140px] w-[350px] overflow-hidden border"
							style="
								clip-path: polygon(
									80% 0,

									100% 0,

									100% 70%,

									82% 70%,
									45% 98%,

									4% 75%
								);
								transform: translate(-10px, 10px);
							"
						>
							<img
								src="./assets/images/template.webp"
								alt=""
								class="h-full w-full object-cover"
							/>
						</a>

						<a
							href="./semester-project-2.html"
							class="absolute left-0 bottom-0 h-[360px] w-[800px] overflow-hidden border"
							style="
								clip-path: polygon(
									0 25%,
									7% 7%,
									20% 1%,
									85% 26%,

									100% 100%,
									0 100%
								);
								transform: translate(10px, -10px);
							"
						>
							<img
								src="./assets/images/template.webp"
								alt="Semester Project 2 preview"
								class="h-full w-full object-cover"
							/>
						</a>

						<a
							href="#"
							class="absolute left-0 top-1/2 h-[110px] w-[152px] overflow-hidden border"
							style="
								clip-path: polygon(0 0, 60% 0%, 100% 30%, 35% 45%, 0 100%);
								transform: translate(10px, -33%);
							"
						>
							<img
								src="./assets/images/template.webp"
								alt=""
								class="h-full w-full object-cover"
							/>
						</a>

						<a
							href="./javascript-frameworks.html"
							class="absolute right-0 top-1/2 h-[500px] w-[960px] overflow-hidden border"
							style="
								clip-path: polygon(
									0% 49%,

									10% 40%,
									20% 40%,
									63% 0%,
									80% 8%,
									94% 0%,

									100% 0,
									100% 100%,

									88% 100%,
									70% 71%
								);
								transform: translate(-10px, -50%);
							"
						>
							<img
								src="./assets/images/template.webp"
								alt="JavaScript Frameworks project preview"
								class="h-full w-full object-cover"
							/>
						</a>
					</div>
				</section>
			</section>
		</main>

		<footer class="bg-charcoal px-6 py-8 text-center text-sm text-white">
			<p>&copy; 2026 Arnt Helge Vold</p>
		</footer>
	</body>
</html>
